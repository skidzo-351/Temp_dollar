<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Temp Dollar Phase1</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>Temp Dollar - Phase 1</h1>

<div class="card">
<h2>원화 현금</h2>
<input id="krwCash" type="number" placeholder="300000000">
</div>

<div class="card">
<h2>보유 자산</h2>
<table>
<tr><th>종목</th><th>수량</th><th>평균단가($)</th><th>현재가($)</th></tr>
<tr><td>SGOV</td><td><input id="sgovQty" type="number"></td><td><input id="sgovAvg" type="number"></td><td><input id="sgovPrice" type="number" value="100"></td></tr>
<tr><td>SPY</td><td><input id="spyQty" type="number"></td><td><input id="spyAvg" type="number"></td><td><input id="spyPrice" type="number" value="650"></td></tr>
<tr><td>QQQ</td><td><input id="qqqQty" type="number"></td><td><input id="qqqAvg" type="number"></td><td><input id="qqqPrice" type="number" value="580"></td></tr>
</table>
</div>

<div class="card">
<h2>환율 및 전략</h2>
USD/KRW <input id="usdkrw" type="number" value="1400">
<select id="level">
<option value="0">LEVEL0 SGOV100</option>
<option value="1">LEVEL1 70/30/0</option>
<option value="2">LEVEL2 40/40/20</option>
<option value="3">LEVEL3 0/60/40</option>
</select>
<button onclick="calculate()">계산</button>
</div>

<div id="result" class="card"></div>

<script src="app.js"></script>
</body>
</html>
