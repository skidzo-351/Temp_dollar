<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>달러 자산 전략 신호판 — SPY40+QQQ20+SGOV40</title>
<style>
:root{
  --bg:#0c1018;--s1:#111720;--s2:#171f2e;--b:#1e2d42;
  --blue:#4a8fe8;--green:#3dbe7a;--red:#e05b4b;--amber:#e8a33a;
  --purple:#a87ef5;--cyan:#38c4d8;--teal:#26bfad;--dim:#5a7490;--text:#dce8f5;
  --mono:'Courier New',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Malgun Gothic',sans-serif;font-size:13px;line-height:1.6}
header{background:var(--s1);border-bottom:1px solid var(--b);padding:16px 20px}
.ht{font-size:18px;font-weight:700;color:var(--blue)}
.hs{font-family:var(--mono);font-size:10px;color:var(--dim);margin-top:3px}
.hb{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.hb span{font-family:var(--mono);font-size:9px;padding:2px 8px;border-radius:2px;border:1px solid}
.bg{background:rgba(61,190,122,.1);border-color:rgba(61,190,122,.3);color:var(--green)}
.ba{background:rgba(232,163,58,.1);border-color:rgba(232,163,58,.3);color:var(--amber)}
.bb{background:rgba(74,143,232,.1);border-color:rgba(74,143,232,.3);color:var(--blue)}
.bp{background:rgba(168,126,245,.1);border-color:rgba(168,126,245,.3);color:var(--purple)}
main{max-width:1080px;margin:0 auto;padding:18px 20px 80px}

/* 탭 */
.tabs{display:flex;gap:6px;margin-bottom:18px}
.tab{padding:7px 16px;background:var(--s1);border:1px solid var(--b);color:var(--dim);cursor:pointer;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.06em;border-radius:3px}
.tab.active{background:rgba(74,143,232,.15);border-color:var(--blue);color:var(--blue)}

/* 신호 카드 */
.signal-card{border-radius:8px;padding:18px 20px;margin-bottom:16px;border:2px solid}
.sig-WAITING{background:rgba(90,116,144,.08);border-color:var(--dim)}
.sig-HOLDING{background:rgba(232,163,58,.07);border-color:var(--amber)}
.sig-ENTRY1_READY,.sig-ENTRY2_READY,.sig-ENTRY3_READY{background:rgba(56,196,216,.08);border-color:var(--cyan)}
.sig-EXIT1_READY,.sig-EXIT2_READY{background:rgba(224,91,75,.08);border-color:var(--red)}
.sig-REBAL_HOT_READY{background:rgba(38,191,173,.08);border-color:var(--teal)}
.sig-REBAL_DOWN1_READY,.sig-REBAL_DOWN2_READY{background:rgba(168,126,245,.08);border-color:var(--purple)}
.sc-sig{font-size:20px;font-weight:700;font-family:var(--mono);margin-bottom:6px}
.sc-msg{font-size:13px;margin-bottom:10px}
.sc-meta{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;font-family:var(--mono);font-size:11px}
.sm-item dt{color:var(--dim);font-size:9px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.sm-item dd{font-weight:700}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.kpi{background:var(--s2);border:1px solid var(--b);border-radius:5px;padding:11px 10px;text-align:center}
.kpi dt{font-family:var(--mono);font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.kpi dd{font-family:var(--mono);font-size:16px;font-weight:700}

/* 차트 패널 */
.panel{background:var(--s1);border:1px solid var(--b);border-radius:6px;overflow:hidden;margin-bottom:14px}
.ph{padding:10px 14px;border-bottom:1px solid var(--b);font-family:var(--mono);font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;display:flex;justify-content:space-between;align-items:center}
.pb{padding:12px}
canvas{display:block}
.leg{display:flex;gap:10px;flex-wrap:wrap;font-family:var(--mono);font-size:10px;color:var(--dim);margin-top:8px}
.lw{display:inline-block;width:12px;height:2px;margin-right:4px;vertical-align:middle}
.ld{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;vertical-align:middle}
.lt{display:inline-block;width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;border-bottom:6px solid;margin-right:4px;vertical-align:middle}

/* 거래 로그 */
.log-wrap{max-height:300px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11px}
th{padding:5px 8px;border-bottom:1px solid var(--b);color:var(--dim);font-size:9px;text-align:left;position:sticky;top:0;background:var(--s1);text-transform:uppercase}
td{padding:5px 8px;border-bottom:1px solid rgba(30,45,66,.4)}
.tag{display:inline-block;padding:1px 5px;font-size:9px;font-weight:700;border:1px solid currentColor;border-radius:2px}

/* 전략 파라미터 */
.param-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.param-box{background:var(--s2);border:1px solid var(--b);border-radius:5px;padding:13px 14px}
.pb-title{font-family:var(--mono);font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.pb-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(30,45,66,.3);font-family:var(--mono);font-size:11px}
.pb-row:last-child{border:none}
.pb-key{color:var(--dim)}.pb-val{font-weight:700}

.pos{color:var(--green)}.neg{color:var(--red)}.warn{color:var(--amber)}.neu{color:var(--blue)}

#loading{text-align:center;padding:60px;font-family:var(--mono);color:var(--dim)}
</style>
</head>
<body>
<header>
  <div class="ht">달러 자산 전략 신호판</div>
  <div class="hs" id="genAt">데이터 로딩 중...</div>
  <div class="hb">
    <span class="bg">SPY 40% + QQQ 20% + SGOV 40%</span>
    <span class="ba">진입 -5/-10/-15% | 청산 +5%/+10%</span>
    <span class="bb">36M 롤링 회귀선</span>
    <span class="bp">과열 리밸 +20% | 하락 리밸 평단-20%/-40%</span>
  </div>
</header>

<main>
  <div id="loading">📡 신호 데이터 로딩 중...</div>
  <div id="app" style="display:none">
    <div class="tabs">
      <button class="tab active" onclick="sw('SPY',this)">SPY 신호</button>
      <button class="tab" onclick="sw('QQQ',this)">QQQ 신호</button>
    </div>
    <div id="signalCard"></div>
    <div class="kpi-row" id="kpiRow"></div>
    <div class="panel">
      <div class="ph"><span>SPY 가격 + 36M 회귀선 + 괴리율</span><span id="cn" style="color:var(--amber)"></span></div>
      <div class="pb"><canvas id="priceC" height="240"></canvas><div class="leg" id="priceLeg"></div></div>
    </div>
    <div class="panel">
      <div class="ph"><span>괴리율 히스토리</span><span style="color:var(--dim);font-family:var(--mono);font-size:10px">진입 -5/-10/-15% | 청산 +5/+10% | 과열 +20%</span></div>
      <div class="pb"><canvas id="divC" height="160"></canvas></div>
    </div>
    <div class="param-grid" id="paramGrid"></div>
    <div class="panel">
      <div class="ph"><span>최근 거래 기록</span><span id="tradeStat" style="color:var(--amber)"></span></div>
      <div class="pb log-wrap"><table><thead><tr><th>날짜</th><th>구분</th><th>괴리율</th><th>가격</th><th>SPY평단</th><th>평단손실</th><th>진입단계</th></tr></thead>
      <tbody id="logB"></tbody></table></div>
    </div>
  </div>
</main>

<script>
let D = null; let cur = 'SPY';
const C = {
  price:'#4a8fe8', pred:'#3dbe7a', div_line:'#e8a33a',
  entry:'#38c4d8', exit:'#e05b4b', rebal_hot:'#26bfad', rebal_down:'#a87ef5',
  dim:'#5a7490', zero:'rgba(90,116,144,0.3)'
};

const SIG_COLOR = {
  WAITING:'#5a7490', HOLDING:'#e8a33a',
  ENTRY1_READY:'#38c4d8', ENTRY2_READY:'#38c4d8', ENTRY3_READY:'#38c4d8',
  EXIT1_READY:'#e05b4b', EXIT2_READY:'#e05b4b',
  REBAL_HOT_READY:'#26bfad', REBAL_DOWN1_READY:'#a87ef5', REBAL_DOWN2_READY:'#a87ef5',
  NO_SIGNAL:'#5a7490'
};

const TAG_MAP = {
  ENTRY1:'te1', ENTRY2:'te2', ENTRY3:'te3',
  EXIT1:'tex1', EXIT2:'tex2',
  REBAL_HOT:'trh', REBAL_DOWN1:'trd', REBAL_DOWN2:'trd'
};
const TAG_LABEL = {
  ENTRY1:'1차진입', ENTRY2:'2차진입', ENTRY3:'3차진입',
  EXIT1:'청산1(+5%)', EXIT2:'청산2(+10%)',
  REBAL_HOT:'과열리밸⚖️', REBAL_DOWN1:'하락리밸1💸', REBAL_DOWN2:'하락리밸2💸'
};

const fmt = v => '$' + (typeof v === 'number' ? v.toLocaleString(undefined,{maximumFractionDigits:2}) : v);
const fp  = (v,s=true) => (s&&v>=0?'+':'') + Number(v).toFixed(2) + '%';

function getAsset(){ return D?.assets?.[cur]; }

function renderSignal(){
  const a = getAsset(); if(!a) return;
  const c = a.current; const sig = c.signal;
  const col = SIG_COLOR[sig] || C.dim;
  document.getElementById('signalCard').innerHTML = `
    <div class="signal-card sig-${sig}" style="border-color:${col}">
      <div class="sc-sig" style="color:${col}">${c.msg || sig}</div>
      <div class="sc-meta">
        <div class="sm-item"><dt>현재 괴리율</dt><dd style="color:${(c.div||0)<0?'#e8a33a':'#3dbe7a'}">${c.div!=null?fp(c.div,true):'—'}</dd></div>
        <div class="sm-item"><dt>SPY 현재가</dt><dd>${c.close!=null?fmt(c.close):'—'}</dd></div>
        <div class="sm-item"><dt>진입 단계</dt><dd>${c.es}차 진입${c.es>0?' 중':' 대기'}</dd></div>
        <div class="sm-item"><dt>전술 평단가</dt><dd>${c.spy_avg>0?fmt(c.spy_avg):'—'}</dd></div>
        <div class="sm-item"><dt>평단 대비 손실</dt><dd style="color:${(c.spy_loss||0)<-10?'#e05b4b':(c.spy_loss||0)<0?'#e8a33a':'#3dbe7a'}">${c.spy_avg>0?fp(c.spy_loss||0,true):'—'}</dd></div>
        <div class="sm-item"><dt>기준일</dt><dd>${c.date||'—'}</dd></div>
      </div>
    </div>`;
}

function renderKPI(){
  const a = getAsset(); if(!a) return;
  const c = a.current; const p = a.params||{};
  const trades = a.trades||[];
  const n_entry = trades.filter(t=>t.type.startsWith('ENTRY')).length;
  const n_exit  = trades.filter(t=>t.type.startsWith('EXIT')).length;
  const n_rebal = trades.filter(t=>t.type.startsWith('REBAL')).length;
  document.getElementById('kpiRow').innerHTML = [
    {l:'진입 횟수',   v:`${n_entry}회`,  c:'neu'},
    {l:'청산 횟수',   v:`${n_exit}회`,   c:'neg'},
    {l:'리밸 횟수',   v:`${n_rebal}회`,  c:'warn'},
    {l:'전략 파라미터',v:`36M | -5/-10/-15%`, c:'pos'},
  ].map(k=>`<div class="kpi"><dt>${k.l}</dt><dd class="${k.c}">${k.v}</dd></div>`).join('');
}

function drawPriceChart(){
  const a = getAsset(); if(!a) return;
  const cv = document.getElementById('priceC');
  cv.width = cv.parentElement.offsetWidth-24; const W=cv.width, H=cv.height;
  const ctx = cv.getContext('2d');
  const P = {l:70, r:12, t:12, b:24};
  const closes = a.closes||[]; const preds = a.predicted||[];
  // 최근 756거래일(3년)만 표시
  const SHOW = Math.min(closes.length, 900);
  const sl = closes.slice(-SHOW); const pl = preds.slice(-SHOW);
  const dl = (a.dates||[]).slice(-SHOW);
  const allV = [...sl, ...pl.filter(Boolean)];
  const lo = Math.min(...allV)*0.97, hi = Math.max(...allV)*1.03;
  const toY = v => P.t+(1-(v-lo)/(hi-lo))*(H-P.t-P.b);
  const toX = (_,i) => P.l+(i/(sl.length-1||1))*(W-P.l-P.r);
  ctx.clearRect(0,0,W,H);

  // 그리드
  [lo,(lo+hi)/2,hi].forEach(v=>{
    const y=toY(v);
    ctx.strokeStyle='rgba(30,45,66,0.4)';ctx.lineWidth=1;ctx.setLineDash([]);
    ctx.beginPath();ctx.moveTo(P.l,y);ctx.lineTo(W-P.r,y);ctx.stroke();
    ctx.fillStyle=C.dim;ctx.font='10px monospace';ctx.textAlign='right';
    ctx.fillText(v>=1000?v.toFixed(0):v.toFixed(1),P.l-3,y+3);
  });
  // X축
  ctx.fillStyle=C.dim;ctx.font='10px monospace';ctx.textAlign='center';
  [0, Math.floor(SHOW/3), Math.floor(SHOW*2/3), SHOW-1].forEach(i=>{
    if(i<dl.length) ctx.fillText(dl[i]?.slice(0,7)||'',toX(0,i),H-P.b+14);
  });

  // 회귀선
  ctx.save();ctx.strokeStyle=C.pred;ctx.lineWidth=1.5;ctx.setLineDash([3,3]);
  ctx.beginPath();let started=false;
  pl.forEach((v,i)=>{if(v!=null){started?ctx.lineTo(toX(v,i),toY(v)):ctx.moveTo(toX(v,i),toY(v));started=true;}});
  ctx.stroke();ctx.restore();

  // 가격
  ctx.save();ctx.strokeStyle=C.price;ctx.lineWidth=2;ctx.setLineDash([]);
  ctx.beginPath();sl.forEach((v,i)=>i?ctx.lineTo(toX(v,i),toY(v)):ctx.moveTo(toX(v,i),toY(v)));
  ctx.stroke();ctx.restore();

  // 거래 마커
  const trades = a.trades||[];
  const startIdx = closes.length - SHOW;
  trades.forEach(t=>{
    const absIdx = (a.dates||[]).indexOf(t.date);
    const relIdx = absIdx - startIdx;
    if(relIdx<0||relIdx>=sl.length)return;
    const x=toX(0,relIdx), y=toY(sl[relIdx]);
    ctx.save();
    if(t.type.startsWith('ENTRY')){ctx.fillStyle=C.entry;ctx.beginPath();ctx.moveTo(x,y-6);ctx.lineTo(x-3,y+1);ctx.lineTo(x+3,y+1);ctx.closePath();ctx.fill();}
    else if(t.type.startsWith('EXIT')){ctx.fillStyle=C.exit;ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill();}
    else if(t.type==='REBAL_HOT'){ctx.fillStyle=C.rebal_hot;ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.beginPath();ctx.rect(x-4,y-4,8,8);ctx.fill();ctx.stroke();}
    else{ctx.fillStyle=C.rebal_down;ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill();}
    ctx.restore();
  });

  document.getElementById('priceLeg').innerHTML=[
    `<span><span class="lw" style="background:${C.price}"></span>SPY 가격</span>`,
    `<span><span class="lw" style="background:${C.pred};opacity:.7"></span>36M 회귀선</span>`,
    `<span><span class="lt" style="border-bottom-color:${C.entry}"></span>진입</span>`,
    `<span><span class="ld" style="background:${C.exit}"></span>청산</span>`,
    `<span><span class="ld" style="background:${C.rebal_hot};border:1px solid #fff"></span>과열리밸</span>`,
    `<span><span class="ld" style="background:${C.rebal_down}"></span>하락리밸</span>`,
  ].join('');
  document.getElementById('cn').textContent = `최근 ${SHOW}거래일`;
}

function drawDivChart(){
  const a = getAsset(); if(!a) return;
  const cv = document.getElementById('divC');
  cv.width = cv.parentElement.offsetWidth-24; const W=cv.width, H=cv.height;
  const ctx = cv.getContext('2d');
  const P = {l:52, r:12, t:10, b:22};
  const SHOW = Math.min((a.divergence||[]).length, 900);
  const divs = (a.divergence||[]).slice(-SHOW).map(v=>v??null);
  const dates = (a.dates||[]).slice(-SHOW);
  const vals = divs.filter(Boolean);
  if(!vals.length) return;
  const lo=Math.min(-25,...vals), hi=Math.max(25,...vals);
  const toY = v => P.t+(1-(v-lo)/(hi-lo))*(H-P.t-P.b);
  const toX = (_,i) => P.l+(i/(divs.length-1||1))*(W-P.l-P.r);
  ctx.clearRect(0,0,W,H);

  // 기준선들
  [-15,-10,-5,0,5,10,20].forEach(v=>{
    const y=toY(v);
    const isKey=[0,5,-5].includes(v);
    ctx.strokeStyle=isKey?'rgba(90,116,144,0.4)':'rgba(30,45,66,0.3)';
    ctx.lineWidth=1;ctx.setLineDash(isKey?[]:[2,4]);
    ctx.beginPath();ctx.moveTo(P.l,y);ctx.lineTo(W-P.r,y);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle=C.dim;ctx.font='9px monospace';ctx.textAlign='right';
    ctx.fillText(v+'%',P.l-2,y+3);
  });

  // 면적
  const zeroY=toY(0);
  ctx.save();ctx.beginPath();ctx.moveTo(toX(0,0),zeroY);
  divs.forEach((v,i)=>{if(v!=null)ctx.lineTo(toX(v,i),toY(v));else ctx.lineTo(toX(null,i),zeroY);});
  ctx.lineTo(toX(0,divs.length-1),zeroY);ctx.closePath();
  ctx.fillStyle='rgba(74,143,232,0.08)';ctx.fill();ctx.restore();

  // 괴리율 선
  ctx.save();ctx.strokeStyle=C.div_line;ctx.lineWidth=1.5;ctx.setLineDash([]);
  ctx.beginPath();let s=false;
  divs.forEach((v,i)=>{if(v!=null){s?ctx.lineTo(toX(v,i),toY(v)):ctx.moveTo(toX(v,i),toY(v));s=true;}else s=false;});
  ctx.stroke();ctx.restore();

  // X축
  ctx.fillStyle=C.dim;ctx.font='9px monospace';ctx.textAlign='center';
  [0,Math.floor(SHOW/3),Math.floor(SHOW*2/3),SHOW-1].forEach(i=>{
    if(i<dates.length)ctx.fillText(dates[i]?.slice(0,7)||'',toX(0,i),H-P.b+14);
  });
}

function renderParams(){
  const a = getAsset(); if(!a) return;
  const st = D.strategy||{};
  document.getElementById('paramGrid').innerHTML = `
    <div class="param-box">
      <div class="pb-title">📋 포트폴리오 기본 설정</div>
      <div class="pb-row"><span class="pb-key">기본 비중</span><span class="pb-val pos">SPY 40% · QQQ 20% · SGOV 40%</span></div>
      <div class="pb-row"><span class="pb-key">월 DCA</span><span class="pb-val">SPY $200 · QQQ $100 · SGOV $200</span></div>
      <div class="pb-row"><span class="pb-key">신호 기준</span><span class="pb-val">SPY 36M 롤링 회귀선 괴리율</span></div>
      <div class="pb-row"><span class="pb-key">1차 진입 (-5%)</span><span class="pb-val">SGOV 순자산×12% → SPY:QQQ=2:1</span></div>
      <div class="pb-row"><span class="pb-key">2차 진입 (-10%)</span><span class="pb-val">SGOV 순자산×12% → SPY:QQQ=2:1</span></div>
      <div class="pb-row"><span class="pb-key">3차 진입 (-15%)</span><span class="pb-val">SGOV 잔액 전부(≈16%) → SPY:QQQ=2:1</span></div>
    </div>
    <div class="param-box">
      <div class="pb-title">📋 청산 · 리밸런싱</div>
      <div class="pb-row"><span class="pb-key">청산 1차 (+5%)</span><span class="pb-val warn">전술 포지션 50% 매도 → SGOV</span></div>
      <div class="pb-row"><span class="pb-key">청산 2차 (+10%)</span><span class="pb-val neg">전술 포지션 전량 → SAFE 복귀</span></div>
      <div class="pb-row"><span class="pb-key">과열 리밸 (+20% 교차)</span><span class="pb-val" style="color:var(--teal)">전체 포트 40:20:40 복원 (제한없음)</span></div>
      <div class="pb-row"><span class="pb-key">하락 리밸1 (평단-20%)</span><span class="pb-val" style="color:var(--purple)">외부현금 총자산×25% 투입</span></div>
      <div class="pb-row"><span class="pb-key">하락 리밸2 (평단-40%)</span><span class="pb-val" style="color:var(--purple)">외부현금 총자산×25% 추가</span></div>
      <div class="pb-row"><span class="pb-key">수수료</span><span class="pb-val">0.5% 편도</span></div>
    </div>`;
}

function renderLog(){
  const a = getAsset(); if(!a) return;
  const trades = [...(a.latest_trades||[])].reverse();
  document.getElementById('logB').innerHTML = trades.map(t=>{
    const lbl = TAG_LABEL[t.type]||t.type;
    const isEntry=t.type.startsWith('ENTRY'),isExit=t.type.startsWith('EXIT');
    const isRH=t.type==='REBAL_HOT',isRD=t.type.startsWith('REBAL_DOWN');
    const tagColor=isEntry?'color:var(--cyan)':isExit?'color:var(--red)':isRH?'color:var(--teal)':'color:var(--purple)';
    return`<tr>
      <td>${t.date}</td>
      <td><span class="tag" style="${tagColor}">${lbl}</span></td>
      <td style="color:${(t.div||0)<0?'#e8a33a':'#3dbe7a'}">${(t.div||0)>0?'+':''}${(t.div||0).toFixed(2)}%</td>
      <td>${fmt(t.close||0)}</td>
      <td>${t.spy_avg>0?fmt(t.spy_avg):'—'}</td>
      <td style="color:${(t.spy_loss||0)<-15?'#e05b4b':(t.spy_loss||0)<0?'#e8a33a':'#3dbe7a'}">${t.spy_avg>0?fp(t.spy_loss||0,true):'—'}</td>
      <td>${t.es}단계</td>
    </tr>`;
  }).join('');
  const all = a.trades||[];
  document.getElementById('tradeStat').textContent =
    `총 ${all.length}회 (진입${all.filter(t=>t.type.startsWith('ENTRY')).length} · 청산${all.filter(t=>t.type.startsWith('EXIT')).length} · 리밸${all.filter(t=>t.type.startsWith('REBAL')).length})`;
}

function renderAll(){ renderSignal();renderKPI();drawPriceChart();drawDivChart();renderParams();renderLog(); }
function sw(t,btn){ cur=t;document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderAll(); }

async function init(){
  try{
    const r = await fetch('data.json?t='+Date.now());
    if(!r.ok) throw new Error('HTTP '+r.status);
    D = await r.json();
    if(!D.assets||!Object.keys(D.assets).length) throw new Error('데이터 없음');
    const dt = new Date(D.generated_at);
    document.getElementById('genAt').textContent =
      `업데이트: ${dt.toLocaleString('ko-KR',{timeZone:'Asia/Seoul'})} KST`;
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='block';
    renderAll();
  }catch(e){
    document.getElementById('loading').textContent = '⚠️ 데이터 로드 실패: '+e.message;
  }
}
window.addEventListener('load', init);
let rt; window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(()=>{drawPriceChart();drawDivChart();},200);});
</script>
</body>
</html>
