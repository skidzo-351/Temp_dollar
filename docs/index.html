<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>달러 자산 전략 신호판 — SPY40+QQQ20+SGOV40</title>
<style>
:root{
  --bg:#0c1018;--s1:#111720;--s2:#171f2e;--b:#1e2d42;
  --blue:#4a8fe8;--green:#3dbe7a;--red:#e05b4b;--amber:#e8a33a;
  --purple:#a87ef5;--cyan:#38c4d8;--teal:#26bfad;--dim:#5a7490;--text:#dce8f5;
  --mono:'Courier New',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Malgun Gothic',sans-serif;font-size:13px;line-height:1.6}
header{background:var(--s1);border-bottom:1px solid var(--b);padding:16px 20px}
.ht{font-size:18px;font-weight:700;color:var(--blue)}
.hs{font-family:var(--mono);font-size:10px;color:var(--dim);margin-top:3px}
.hb{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.hb span{font-family:var(--mono);font-size:9px;padding:2px 8px;border-radius:2px;border:1px solid}
.bg{background:rgba(61,190,122,.1);border-color:rgba(61,190,122,.3);color:var(--green)}
.ba{background:rgba(232,163,58,.1);border-color:rgba(232,163,58,.3);color:var(--amber)}
.bb{background:rgba(74,143,232,.1);border-color:rgba(74,143,232,.3);color:var(--blue)}
.bp{background:rgba(168,126,245,.1);border-color:rgba(168,126,245,.3);color:var(--purple)}
main{max-width:1080px;margin:0 auto;padding:18px 20px 80px}

/* 투자 시작일 설정 배너 */
.start-banner{background:var(--s2);border:1px solid var(--b);border-radius:6px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.start-banner.not-set{border-color:var(--amber);background:rgba(232,163,58,.06)}
.start-banner.active{border-color:var(--green);background:rgba(61,190,122,.05)}
.sb-label{font-family:var(--mono);font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.07em;white-space:nowrap}
.sb-date{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--text)}
.sb-input{background:var(--bg);border:1px solid var(--b);color:var(--text);font-family:var(--mono);font-size:12px;padding:5px 8px;border-radius:3px;outline:none}
.sb-input:focus{border-color:var(--blue)}
.sb-btn{font-family:var(--mono);font-size:10px;padding:5px 12px;border-radius:3px;border:1px solid;cursor:pointer;background:transparent}
.sb-btn.set{border-color:var(--green);color:var(--green)}
.sb-btn.set:hover{background:rgba(61,190,122,.1)}
.sb-btn.clr{border-color:var(--dim);color:var(--dim)}
.sb-btn.clr:hover{background:rgba(90,116,144,.1)}
.sb-info{font-family:var(--mono);font-size:10px;color:var(--dim);flex:1}

/* 탭 */
.tabs{display:flex;gap:6px;margin-bottom:18px}
.tab{padding:7px 16px;background:var(--s1);border:1px solid var(--b);color:var(--dim);cursor:pointer;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.06em;border-radius:3px}
.tab.active{background:rgba(74,143,232,.15);border-color:var(--blue);color:var(--blue)}

/* 신호 카드 */
.signal-card{border-radius:8px;padding:18px 20px;margin-bottom:16px;border:2px solid}
.sig-WAITING{background:rgba(90,116,144,.08);border-color:var(--dim)}
.sig-HOLDING{background:rgba(232,163,58,.07);border-color:var(--amber)}
.sig-ENTRY1_READY,.sig-ENTRY2_READY,.sig-ENTRY3_READY{background:rgba(56,196,216,.08);border-color:var(--cyan)}
.sig-EXIT_READY{background:rgba(224,91,75,.08);border-color:var(--red)}
.sig-REBAL_HOT_READY{background:rgba(38,191,173,.08);border-color:var(--teal)}
.sc-sig{font-size:20px;font-weight:700;font-family:var(--mono);margin-bottom:6px}
.sc-meta{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;font-family:var(--mono);font-size:11px}
.sm-item dt{color:var(--dim);font-size:9px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.sm-item dd{font-weight:700}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.kpi{background:var(--s2);border:1px solid var(--b);border-radius:5px;padding:11px 10px;text-align:center}
.kpi dt{font-family:var(--mono);font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.kpi dd{font-family:var(--mono);font-size:16px;font-weight:700}

/* 차트 패널 */
.panel{background:var(--s1);border:1px solid var(--b);border-radius:6px;overflow:hidden;margin-bottom:14px}
.ph{padding:10px 14px;border-bottom:1px solid var(--b);font-family:var(--mono);font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;display:flex;justify-content:space-between;align-items:center}
.pb{padding:12px}
canvas{display:block}
.leg{display:flex;gap:10px;flex-wrap:wrap;font-family:var(--mono);font-size:10px;color:var(--dim);margin-top:8px}
.lw{display:inline-block;width:12px;height:2px;margin-right:4px;vertical-align:middle}
.ld{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;vertical-align:middle}
.lt{display:inline-block;width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;border-bottom:6px solid;margin-right:4px;vertical-align:middle}
.lsq{display:inline-block;width:7px;height:7px;border-radius:1px;margin-right:4px;vertical-align:middle;border:1px solid rgba(255,255,255,.4)}

/* 거래 로그 */
.log-wrap{max-height:340px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11px}
th{padding:5px 8px;border-bottom:1px solid var(--b);color:var(--dim);font-size:9px;text-align:left;position:sticky;top:0;background:var(--s1);text-transform:uppercase}
td{padding:5px 8px;border-bottom:1px solid rgba(30,45,66,.4)}
.tag{display:inline-block;padding:1px 5px;font-size:9px;font-weight:700;border:1px solid currentColor;border-radius:2px}
tr.sim-row td{opacity:.45}   /* 시작일 이전 시뮬 행 */
tr.sim-row td:first-child::before{content:'◌ ';color:var(--dim)}

/* 파라미터 */
.param-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.param-box{background:var(--s2);border:1px solid var(--b);border-radius:5px;padding:13px 14px}
.pb-title{font-family:var(--mono);font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.pb-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(30,45,66,.3);font-family:var(--mono);font-size:11px}
.pb-row:last-child{border:none}
.pb-key{color:var(--dim)}.pb-val{font-weight:700}

.pos{color:var(--green)}.neg{color:var(--red)}.warn{color:var(--amber)}.neu{color:var(--blue)}
#loading{text-align:center;padding:60px;font-family:var(--mono);color:var(--dim)}
</style>
</head>
<body>
<header>
  <div class="ht">달러 자산 전략 신호판</div>
  <div class="hs" id="genAt">데이터 로딩 중...</div>
  <div class="hb">
    <span class="bg">SPY 40% + QQQ 20% + SGOV 40%</span>
    <span class="ba">진입 -5/-10/-15% | 청산 +5%/+10%</span>
    <span class="bb">36M 롤링 회귀선</span>
    <span class="bp">과열 리밸 +20% | 하락 리밸 평단-20%/-40%</span>
  </div>
</header>

<main>
  <div id="loading">📡 신호 데이터 로딩 중...</div>
  <div id="app" style="display:none">

    <!-- 투자 시작일 설정 -->
    <div class="start-banner not-set" id="startBanner">
      <span class="sb-label">투자 시작일</span>
      <span class="sb-date" id="startDateDisp">미설정</span>
      <input type="date" class="sb-input" id="startDateInput">
      <button class="sb-btn set" onclick="setStartDate()">설정</button>
      <button class="sb-btn clr" onclick="clearStartDate()">초기화</button>
      <span class="sb-info" id="startInfo">시작일을 설정하면 이후부터 실제 포지션을 추적합니다. 이전 구간은 백테스트 참고용으로 표시됩니다.</span>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="sw('SPY',this)">SPY 신호</button>
      <button class="tab" onclick="sw('QQQ',this)">QQQ 신호</button>
    </div>

    <div id="signalCard"></div>
    <div class="kpi-row" id="kpiRow"></div>

    <div class="panel">
      <div class="ph">
        <span>SPY 가격 + 36M 회귀선</span>
        <span id="cn" style="color:var(--amber)"></span>
      </div>
      <div class="pb">
        <canvas id="priceC" height="240"></canvas>
        <div class="leg" id="priceLeg"></div>
      </div>
    </div>

    <div class="panel">
      <div class="ph">
        <span>괴리율 히스토리</span>
        <span style="color:var(--dim);font-family:var(--mono);font-size:10px">진입 -5/-10/-15% | 청산 +5/+10% | 과열 +20%</span>
      </div>
      <div class="pb"><canvas id="divC" height="160"></canvas></div>
    </div>

    <div class="param-grid" id="paramGrid"></div>

    <div class="panel">
      <div class="ph">
        <span>거래 기록</span>
        <span id="tradeStat" style="color:var(--amber)"></span>
      </div>
      <div class="pb log-wrap">
        <table>
          <thead><tr>
            <th>날짜</th><th>구분</th><th>괴리율</th><th>가격</th><th>포지션</th><th>구분</th>
          </tr></thead>
          <tbody id="logB"></tbody>
        </table>
      </div>
    </div>

  </div><!-- #app -->
</main>

<script>
'use strict';
const LS_START = 'sgov_start_date';
let D = null;
let curTicker = 'SPY';
let startDate = localStorage.getItem(LS_START) || '';  // 'YYYY-MM-DD' or ''

// ── 시작일 UI ────────────────────────────────────────────────
function updateStartBanner(){
  const banner = document.getElementById('startBanner');
  const disp   = document.getElementById('startDateDisp');
  const info   = document.getElementById('startInfo');
  const input  = document.getElementById('startDateInput');

  if(startDate){
    banner.className = 'start-banner active';
    disp.textContent = startDate;
    input.value = startDate;
    info.textContent = `${startDate} 이후: 실제 포지션 추적 | 이전: 백테스트 참고용 (반투명 표시)`;
  } else {
    banner.className = 'start-banner not-set';
    disp.textContent = '미설정';
    info.textContent = '시작일을 설정하면 이후부터 실제 포지션을 추적합니다. 이전 구간은 백테스트 참고용으로 표시됩니다.';
  }
}

function setStartDate(){
  const v = document.getElementById('startDateInput').value;
  if(!v){ alert('날짜를 선택해주세요.'); return; }
  startDate = v;
  localStorage.setItem(LS_START, v);
  updateStartBanner();
  renderAll();
}

function clearStartDate(){
  startDate = '';
  localStorage.removeItem(LS_START);
  document.getElementById('startDateInput').value = '';
  updateStartBanner();
  renderAll();
}

// ── 시작일 기준 신호 재계산 ──────────────────────────────────
function computeFromStartDate(asset){
  /**
   * 전체 trades를 원본으로 두고,
   * 시작일 이후 trades만 기반으로 '실제 포지션'을 재계산.
   * 시작일 이전 trades는 isSim=true 태그.
   */
  const dates  = asset.dates || [];
  const trades = asset.trades || [];

  if(!startDate){
    // 시작일 미설정: 전체를 시뮬로 표시
    return trades.map(t => ({...t, isSim: true}));
  }

  // 시작일 이후 trades만으로 현재 포지션 재계산
  const realTrades = trades.filter(t => {
    const d = dates[t.index] || '';
    return d >= startDate;
  });

  // 실제 포지션 추적: realTrades를 순서대로 처리
  // SAFE 상태에서 시작, 진입/청산/리밸 적용
  let es = 0; // 진입 단계
  realTrades.forEach(t => {
    if(t.type.startsWith('ENTRY')){
      es = t.type === 'ENTRY1' ? 1 : t.type === 'ENTRY2' ? 2 : 3;
    } else if(t.type === 'EXIT2'){
      es = 0;
    } else if(t.type === 'EXIT'){
      // 50% 청산 — 단계 유지 (보유 중)
    }
    t._real_es = es;
  });

  // 전체 trades에 isSim 태그 부착
  return trades.map(t => {
    const d = dates[t.index] || '';
    return {...t, isSim: d < startDate};
  });
}

function getCurrentPositionFromStart(asset){
  /**
   * 시작일 이후 trades 기반으로 현재 실제 포지션 반환
   * 반환: { es: 0~3, lastTrade: {} | null }
   */
  if(!startDate) return { es: null, lastTrade: null };

  const dates  = asset.dates || [];
  const trades = asset.trades || [];
  const realTrades = trades
    .filter(t => (dates[t.index]||'') >= startDate)
    .sort((a,b) => a.index - b.index);

  let es = 0;
  let lastTrade = null;
  for(const t of realTrades){
    if(t.type === 'ENTRY1') es = 1;
    else if(t.type === 'ENTRY2') es = 2;
    else if(t.type === 'ENTRY3') es = 3;
    else if(t.type === 'EXIT2') es = 0;
    else if(t.type === 'REBAL_HOT') es = 0;
    lastTrade = t;
  }
  return { es, lastTrade };
}

// ── 헬퍼 ─────────────────────────────────────────────────────
const CV = {
  price:'#4a8fe8', pred:'#3dbe7a', div_line:'#e8a33a',
  entry:'#38c4d8', exit:'#e05b4b', rebal_hot:'#26bfad', rebal_down:'#a87ef5',
  dim:'#5a7490', start_line:'rgba(61,190,122,0.6)'
};

const SIG_COLOR = {
  WAITING:'#5a7490', HOLDING:'#e8a33a',
  ENTRY1_READY:'#38c4d8', ENTRY2_READY:'#38c4d8', ENTRY3_READY:'#38c4d8',
  EXIT_READY:'#e05b4b', REBAL_HOT_READY:'#26bfad', NO_SIGNAL:'#5a7490'
};

const SIG_MSG = {
  WAITING:         '관망 중 — SGOV 보유',
  ENTRY1_READY:    '⚡ 1차 진입 — SGOV 순자산×12% → SPY:QQQ=2:1',
  ENTRY2_READY:    '⚡ 2차 진입 — SGOV 순자산×12% → SPY:QQQ=2:1',
  ENTRY3_READY:    '⚡ 3차 진입 — SGOV 잔액 전부 → SPY:QQQ=2:1',
  HOLDING:         '전술 포지션 보유 중',
  EXIT_READY:      '💰 청산 신호 — 분할 청산 진행',
  REBAL_HOT_READY: '⚖️ 과열 리밸 — 전체 포트 40:20:40 복원',
};

const TAG_LABEL = {
  ENTRY1:'1차진입', ENTRY2:'2차진입', ENTRY3:'3차진입',
  EXIT:'청산1(+5%)', EXIT2:'청산2(+10%)',
  REBAL_HOT:'과열리밸⚖️', REBAL_DOWN1:'하락리밸1💸', REBAL_DOWN2:'하락리밸2💸'
};
const TAG_COLOR = {
  ENTRY1:'color:var(--cyan)',  ENTRY2:'color:var(--blue)',  ENTRY3:'color:var(--green)',
  EXIT:'color:var(--amber)',   EXIT2:'color:var(--red)',
  REBAL_HOT:'color:var(--teal)',
  REBAL_DOWN1:'color:var(--purple)', REBAL_DOWN2:'color:var(--purple)'
};

const esLabel = e => ['SAFE','1차 진입 중','2차 진입 중','3차 진입 중'][e] || '—';
const posToLabel = p => p>=0.99?'3차':p>=0.69?'2차':p>=0.34?'1차':'SAFE';
const fmt = v => (v==null||isNaN(v))? '—' : '$'+Number(v).toLocaleString(undefined,{maximumFractionDigits:2});
const fp  = (v,s=true) => (v==null||isNaN(v))? '—' : (s&&v>=0?'+':'')+Number(v).toFixed(2)+'%';

function getAsset(){ return D?.assets?.[curTicker]; }

// ── 신호 카드 ────────────────────────────────────────────────
function renderSignal(){
  const a = getAsset(); if(!a) return;
  const c   = a.current;
  const sig = c.signal || 'WAITING';
  const col = SIG_COLOR[sig] || CV.dim;
  const div = c.divergence;

  // 실제 포지션 (시작일 기준)
  const { es: realEs } = getCurrentPositionFromStart(a);
  const hasStart = !!startDate;

  // 포지션 표시: 시작일 설정 여부에 따라 구분
  const posDisplay = hasStart
    ? `<span class="${realEs>0?'warn':'pos'}">${esLabel(realEs)}</span>`
    : `<span style="color:var(--dim)">시작일 미설정</span>`;

  const posNote = hasStart
    ? (realEs === 0
        ? `<span style="color:var(--dim);font-size:9px">시작일(${startDate}) 이후 SAFE</span>`
        : `<span style="color:var(--amber);font-size:9px">실제 진입 포지션</span>`)
    : `<span style="color:var(--dim);font-size:9px">백테스트 기준: ${posToLabel(c.position||0)}</span>`;

  document.getElementById('signalCard').innerHTML = `
    <div class="signal-card sig-${sig}" style="border-color:${col}">
      <div class="sc-sig" style="color:${col}">${SIG_MSG[sig]||sig}</div>
      <div class="sc-meta">
        <div class="sm-item">
          <dt>현재 괴리율</dt>
          <dd style="color:${div!=null&&div<0?'#e8a33a':div!=null&&div>0?'#3dbe7a':CV.dim}">
            ${div!=null ? fp(div,true) : '—'}
          </dd>
        </div>
        <div class="sm-item">
          <dt>SPY 현재가</dt>
          <dd>${fmt(c.close)}</dd>
        </div>
        <div class="sm-item">
          <dt>실제 포지션</dt>
          <dd>${posDisplay}<br>${posNote}</dd>
        </div>
        <div class="sm-item">
          <dt>36M 회귀 예측가</dt>
          <dd>${fmt(c.predicted)}</dd>
        </div>
        <div class="sm-item">
          <dt>신고가 (SAFE기준)</dt>
          <dd>${fmt(c.peak)}</dd>
        </div>
        <div class="sm-item">
          <dt>기준일</dt>
          <dd>${c.date||'—'}</dd>
        </div>
      </div>
    </div>`;
}

// ── KPI ─────────────────────────────────────────────────────
function renderKPI(){
  const a = getAsset(); if(!a) return;
  const trades = a.trades||[];
  const dates  = a.dates||[];

  // 시작일 이후 실제 거래만 카운트
  const realTrades = startDate
    ? trades.filter(t => (dates[t.index]||'') >= startDate)
    : [];
  const allTrades = trades;

  const n_real_entry = realTrades.filter(t=>t.type.startsWith('ENTRY')).length;
  const n_sim_entry  = allTrades.filter(t=>t.type.startsWith('ENTRY')).length;
  const m = a.metrics||{};

  document.getElementById('kpiRow').innerHTML = [
    {l: startDate ? '실제 진입' : '백테스트 진입',
     v: startDate ? `${n_real_entry}회` : `${n_sim_entry}회`,
     c: 'neu'},
    {l: '백테스트 수익률', v: fp(m.total_return, true), c:(m.total_return||0)>=0?'pos':'neg'},
    {l: '백테스트 거래',   v: `${allTrades.length}회`, c:'warn'},
    {l: '투자 시작일', v: startDate||'미설정', c: startDate?'pos':'neg'},
  ].map(k=>`<div class="kpi"><dt>${k.l}</dt><dd class="${k.c}" style="font-size:${startDate&&k.l==='투자 시작일'?'11px':'16px'}">${k.v}</dd></div>`).join('');
}

// ── 가격 차트 ────────────────────────────────────────────────
function drawPriceChart(){
  const a = getAsset(); if(!a) return;
  const cv = document.getElementById('priceC');
  cv.width = cv.parentElement.offsetWidth-24;
  const W=cv.width, H=cv.height;
  const ctx=cv.getContext('2d');
  const P={l:70,r:12,t:12,b:24};

  const closes = a.closes||[];
  const preds  = a.predicted||[];
  const dates  = a.dates||[];
  const SHOW   = Math.min(closes.length, 900);
  const sl = closes.slice(-SHOW), pl = preds.slice(-SHOW), dl = dates.slice(-SHOW);
  const globalStartIdx = closes.length - SHOW; // 표시 구간의 절대 시작 인덱스

  const allV = [...sl, ...pl.filter(v=>v!=null)];
  if(!allV.length) return;
  const lo=Math.min(...allV)*0.97, hi=Math.max(...allV)*1.03;
  const toY=v=>P.t+(1-(v-lo)/(hi-lo))*(H-P.t-P.b);
  const toX=(_,i)=>P.l+(i/(sl.length-1||1))*(W-P.l-P.r);
  ctx.clearRect(0,0,W,H);

  // 그리드
  [lo,(lo+hi)/2,hi].forEach(v=>{
    const y=toY(v);
    ctx.strokeStyle='rgba(30,45,66,0.4)';ctx.lineWidth=1;ctx.setLineDash([]);
    ctx.beginPath();ctx.moveTo(P.l,y);ctx.lineTo(W-P.r,y);ctx.stroke();
    ctx.fillStyle=CV.dim;ctx.font='10px monospace';ctx.textAlign='right';
    ctx.fillText(v>=1000?v.toFixed(0):v.toFixed(1),P.l-3,y+3);
  });
  ctx.fillStyle=CV.dim;ctx.font='10px monospace';ctx.textAlign='center';
  [0,Math.floor(SHOW/3),Math.floor(SHOW*2/3),SHOW-1].forEach(i=>{
    if(i<dl.length) ctx.fillText(dl[i]?.slice(0,7)||'',toX(0,i),H-P.b+14);
  });

  // 시작일 수직선
  if(startDate){
    const si = dl.findIndex(d=>d>=startDate);
    if(si>=0){
      const sx = toX(0,si);
      ctx.save();
      ctx.strokeStyle=CV.start_line;ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
      ctx.beginPath();ctx.moveTo(sx,P.t);ctx.lineTo(sx,H-P.b);ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle=CV.start_line;ctx.font='9px monospace';ctx.textAlign='left';
      ctx.fillText('투자시작',sx+3,P.t+10);
      ctx.restore();
    }
  }

  // 회귀선
  ctx.save();ctx.strokeStyle=CV.pred;ctx.lineWidth=1.5;ctx.setLineDash([3,3]);
  ctx.beginPath();let st=false;
  pl.forEach((v,i)=>{if(v!=null){st?ctx.lineTo(toX(v,i),toY(v)):ctx.moveTo(toX(v,i),toY(v));st=true;}});
  ctx.stroke();ctx.restore();

  // 가격선
  ctx.save();ctx.strokeStyle=CV.price;ctx.lineWidth=2;ctx.setLineDash([]);
  ctx.beginPath();sl.forEach((v,i)=>i?ctx.lineTo(toX(v,i),toY(v)):ctx.moveTo(toX(v,i),toY(v)));
  ctx.stroke();ctx.restore();

  // 거래 마커 (시작일 이전: 반투명, 이후: 선명)
  const trades = a.trades||[];
  trades.forEach(t=>{
    const ri = t.index - globalStartIdx;
    if(ri<0||ri>=sl.length) return;
    const tradeDate = dates[t.index]||'';
    const isSim = startDate && tradeDate < startDate;
    const x=toX(0,ri), y=toY(sl[ri]);
    ctx.save();
    ctx.globalAlpha = isSim ? 0.3 : 1.0;
    if(t.type.startsWith('ENTRY')){
      ctx.fillStyle=CV.entry;ctx.beginPath();
      ctx.moveTo(x,y-6);ctx.lineTo(x-3,y+1);ctx.lineTo(x+3,y+1);ctx.closePath();ctx.fill();
    } else if(t.type.startsWith('EXIT')){
      ctx.fillStyle=CV.exit;ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill();
    } else if(t.type==='REBAL_HOT'){
      ctx.fillStyle=CV.rebal_hot;ctx.strokeStyle='#fff';ctx.lineWidth=1;
      ctx.beginPath();ctx.rect(x-4,y-4,8,8);ctx.fill();ctx.stroke();
    } else {
      ctx.fillStyle=CV.rebal_down;ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  });

  document.getElementById('priceLeg').innerHTML=[
    `<span><span class="lw" style="background:${CV.price}"></span>SPY 가격</span>`,
    `<span><span class="lw" style="background:${CV.pred};opacity:.7"></span>36M 회귀선</span>`,
    startDate ? `<span><span class="lw" style="background:${CV.start_line}"></span>투자시작</span>` : '',
    `<span><span class="lt" style="border-bottom-color:${CV.entry}"></span>진입</span>`,
    `<span><span class="ld" style="background:${CV.exit}"></span>청산</span>`,
    `<span><span class="lsq" style="background:${CV.rebal_hot}"></span>과열리밸</span>`,
    `<span><span class="ld" style="background:${CV.rebal_down}"></span>하락리밸</span>`,
    startDate ? `<span style="color:var(--dim)">반투명=백테스트참고</span>` : '',
  ].filter(Boolean).join('');
  document.getElementById('cn').textContent = `최근 ${SHOW}거래일`;
}

// ── 괴리율 차트 ──────────────────────────────────────────────
function drawDivChart(){
  const a = getAsset(); if(!a) return;
  const cv=document.getElementById('divC');
  cv.width=cv.parentElement.offsetWidth-24;
  const W=cv.width,H=cv.height;
  const ctx=cv.getContext('2d');
  const P={l:52,r:12,t:10,b:22};

  const SHOW=Math.min((a.divergence||[]).length,900);
  const divs=(a.divergence||[]).slice(-SHOW).map(v=>v??null);
  const dates=(a.dates||[]).slice(-SHOW);
  const vals=divs.filter(v=>v!=null);
  if(!vals.length) return;

  const lo=Math.min(-25,...vals),hi=Math.max(25,...vals);
  const toY=v=>P.t+(1-(v-lo)/(hi-lo))*(H-P.t-P.b);
  const toX=(_,i)=>P.l+(i/(divs.length-1||1))*(W-P.l-P.r);
  ctx.clearRect(0,0,W,H);

  [-15,-10,-5,0,5,10,20].forEach(v=>{
    const y=toY(v); const isKey=[0,5,-5].includes(v);
    ctx.strokeStyle=isKey?'rgba(90,116,144,0.4)':'rgba(30,45,66,0.3)';
    ctx.lineWidth=1;ctx.setLineDash(isKey?[]:[2,4]);
    ctx.beginPath();ctx.moveTo(P.l,y);ctx.lineTo(W-P.r,y);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle=CV.dim;ctx.font='9px monospace';ctx.textAlign='right';
    ctx.fillText(v+'%',P.l-2,y+3);
  });

  // 시작일 이전 배경 어둡게
  if(startDate){
    const si=dates.findIndex(d=>d>=startDate);
    if(si>0){
      ctx.save();
      ctx.fillStyle='rgba(12,16,24,0.45)';
      ctx.fillRect(P.l,P.t,toX(0,si)-P.l,H-P.t-P.b);
      ctx.restore();
    }
  }

  const zeroY=toY(0);
  ctx.save();ctx.beginPath();ctx.moveTo(toX(0,0),zeroY);
  divs.forEach((v,i)=>{if(v!=null)ctx.lineTo(toX(v,i),toY(v));else ctx.lineTo(toX(null,i),zeroY);});
  ctx.lineTo(toX(0,divs.length-1),zeroY);ctx.closePath();
  ctx.fillStyle='rgba(74,143,232,0.08)';ctx.fill();ctx.restore();

  ctx.save();ctx.strokeStyle=CV.div_line;ctx.lineWidth=1.5;ctx.setLineDash([]);
  ctx.beginPath();let s=false;
  divs.forEach((v,i)=>{if(v!=null){s?ctx.lineTo(toX(v,i),toY(v)):ctx.moveTo(toX(v,i),toY(v));s=true;}else s=false;});
  ctx.stroke();ctx.restore();

  // 시작일 수직선
  if(startDate){
    const si=dates.findIndex(d=>d>=startDate);
    if(si>=0){
      ctx.save();ctx.strokeStyle=CV.start_line;ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
      ctx.beginPath();ctx.moveTo(toX(0,si),P.t);ctx.lineTo(toX(0,si),H-P.b);ctx.stroke();
      ctx.setLineDash([]);ctx.restore();
    }
  }

  ctx.fillStyle=CV.dim;ctx.font='9px monospace';ctx.textAlign='center';
  [0,Math.floor(SHOW/3),Math.floor(SHOW*2/3),SHOW-1].forEach(i=>{
    if(i<dates.length) ctx.fillText(dates[i]?.slice(0,7)||'',toX(0,i),H-P.b+14);
  });
}

// ── 거래 로그 ────────────────────────────────────────────────
function renderLog(){
  const a = getAsset(); if(!a) return;
  const dates  = a.dates||[];
  const trades = [...(a.latest_trades||[])].reverse();

  document.getElementById('logB').innerHTML = trades.map(t=>{
    const date    = dates[t.index]||'—';
    const isSim   = startDate && date < startDate;
    const lbl     = TAG_LABEL[t.type]||t.type;
    const tcol    = TAG_COLOR[t.type]||'color:var(--dim)';
    const div     = t.divergence;
    const posLbl  = posToLabel(t.position_after||0);
    const simBadge = isSim
      ? `<span style="font-family:var(--mono);font-size:8px;color:var(--dim);margin-left:4px">백테스트</span>`
      : `<span style="font-family:var(--mono);font-size:8px;color:var(--green);margin-left:4px">실제</span>`;
    return`<tr class="${isSim?'sim-row':''}">
      <td>${date}</td>
      <td><span class="tag" style="${tcol}">${lbl}</span>${simBadge}</td>
      <td style="color:${div<0?'#e8a33a':'#3dbe7a'}">${fp(div,true)}</td>
      <td>${fmt(t.price)}</td>
      <td>${posLbl}</td>
      <td style="color:${isSim?'var(--dim)':'var(--green)'};font-size:9px">${isSim?'참고':'실제'}</td>
    </tr>`;
  }).join('');

  const all = a.trades||[];
  const realCount = startDate
    ? all.filter(t=>(dates[t.index]||'')>=startDate).length
    : 0;
  document.getElementById('tradeStat').textContent = startDate
    ? `실제 ${realCount}회 | 백테스트 전체 ${all.length}회`
    : `백테스트 전체 ${all.length}회 (시작일 미설정)`;
}

// ── 메인 ─────────────────────────────────────────────────────
function renderAll(){
  renderSignal();renderKPI();
  drawPriceChart();drawDivChart();
  renderParams();renderLog();
}

function sw(t,btn){
  curTicker=t;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

async function init(){
  try{
    const r=await fetch('data.json?t='+Date.now());
    if(!r.ok) throw new Error('HTTP '+r.status);
    D=await r.json();
    if(!D.assets||!Object.keys(D.assets).length) throw new Error('데이터 없음');
    const dt=new Date(D.generated_at);
    document.getElementById('genAt').textContent=
      `업데이트: ${dt.toLocaleString('ko-KR',{timeZone:'Asia/Seoul'})} KST`;
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='block';
    // 저장된 시작일 복원
    if(startDate) document.getElementById('startDateInput').value=startDate;
    updateStartBanner();
    renderAll();
  }catch(e){
    document.getElementById('loading').textContent='⚠️ 데이터 로드 실패: '+e.message;
  }
}
window.addEventListener('load',init);
let rt;window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(()=>{drawPriceChart();drawDivChart();},200);});
