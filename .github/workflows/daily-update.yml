name: Daily Signal Update

on:
  schedule:
    - cron: '30 22 * * *'
  workflow_dispatch: {}
  push:
    branches: [ main ]
    paths:
      - 'scripts/**'
      - 'docs/index.html'        # data.json 제외 — 봇 커밋이 재트리거 안 되게
      - '.github/workflows/**'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.ref }}"   # ref별로 그룹 분리 → 동시 실행 충돌 방지
  cancel-in-progress: true

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run signal update script
        run: python scripts/update_data.py

      - name: Commit data.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- docs/data.json; then
            echo "No changes in data.json — skipping commit"
          else
            git add docs/data.json
            git commit -m "chore: daily signal update $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
            git fetch origin main --no-tags
            if git rebase origin/main; then
              echo "Rebased onto origin/main"
            else
              git rebase --abort || true
              git merge --no-edit origin/main || true
            fi
            git push origin HEAD:main
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'
          retention-days: 1
          name: github-pages-${{ github.run_id }}   # run마다 유일한 이름 부여 (중복 아티팩트 방지)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-${{ github.run_id }}   # 업로드와 동일 이름 지정
