name: Daily Signal Update

on:
  schedule:
    - cron: '30 22 * * *'
  workflow_dispatch: {}
  push:
    branches: [ main ]
    paths:
      - 'scripts/**'
      - '.github/workflows/**'

permissions:
  contents: write

concurrency:
  group: daily-signal-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run signal update script
        run: python scripts/update_data.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- docs/data.json; then
            echo "No changes in data.json"
          else
            git add docs/data.json
            git commit -m "chore: daily signal update $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
